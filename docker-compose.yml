services:
  web:
    build:
      context: .
      dockerfile: dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - /app/node_modules
      - .:/app

  test:
    build:
      context: .
      dockerfile: dockerfile.dev
    command: ["npm","run","test"]
    volumes:
      - /app/node_modules
      - .:/app